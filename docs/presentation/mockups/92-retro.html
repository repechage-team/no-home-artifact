<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>NoHome 목업 — 9-2 팀 회고</title>
<link rel="stylesheet" href="shared.css">
<style>
  .msg{margin-top:22px;background:#FBF0D2;border-radius:16px;padding:18px 24px;font-size:18px;font-weight:700;color:#7A5A10;line-height:1.5;text-align:center}
  .msg b{color:#2E6FB0}
  .retros{margin-top:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .rc{background:#fff;border-radius:18px;padding:18px;box-shadow:0 6px 16px rgba(0,0,0,.08)}
  .rc .rn{font-family:'Do Hyeon',sans-serif;font-size:19px;color:#2E2E3A;display:flex;align-items:center;gap:10px}
  .av{width:38px;height:38px;border-radius:50%;color:#fff;font-family:'Do Hyeon',sans-serif;font-size:17px;display:flex;align-items:center;justify-content:center}
  .a-y{background:#F0A030}.a-g{background:#2FB98A}.a-b{background:#3E8EDE}
  .rc .rt{font-size:14px;color:#8A8880;margin-top:12px;line-height:1.6;font-style:italic}
</style>
</head><body>
<div class="slide">
  <div class="f-top-y"></div><div class="f-top-b"></div><div class="f-left"></div><div class="f-right"></div><div class="f-bot"></div>
  <div class="body">
    <div class="title">개발 후기 — 팀 회고</div><div class="rule"></div>
    <div class="msg"><b>패자부활전</b> — 남은 셋이 모인 팀이었지만, 짧은 기간 안에 명확한 역할 분배와 일정 관리로 성공적으로 마무리</div>
    <div class="retros">
      <div class="rc"><div class="rn"><span class="av a-y">최</span>최민식</div><div class="rt">“회고 작성 예정”</div></div>
      <div class="rc"><div class="rn"><span class="av a-g">전</span>전효준</div><div class="rt">“회고 작성 예정”</div></div>
      <div class="rc"><div class="rn"><span class="av a-b">이</span>이정헌</div><div class="rt">“회고 작성 예정”</div></div>
    </div>
  </div>
</div>
<!-- Canva 재현: 상단 팀 메시지(노랑) + 3인 개인 회고 카드(이니셜 아바타). 회고 문구·팀 사진은 팀이 채움. -->
</body></html>
