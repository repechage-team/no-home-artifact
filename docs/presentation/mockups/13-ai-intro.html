<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>NoHome 목업 — 1-3 추가 기능 AI</title>
<link rel="stylesheet" href="shared.css">
<style>
  .two{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .mode{border-radius:20px;padding:20px 22px;box-shadow:0 6px 16px rgba(0,0,0,.08)}
  .mode .ico{font-size:32px}
  .mode .mt{font-family:'Do Hyeon',sans-serif;font-size:22px;margin-top:6px}
  .mode .md{font-size:16px;margin-top:6px;line-height:1.45}
  .q{background:#E1F5EE;border:3px solid #2FB98A} .q .mt,.q .md{color:#0F6E56}
  .a{background:#FBEEDA;border:3px solid #F0A030} .a .mt,.a .md{color:#8A4E08}
  .steps{margin-top:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .step{background:#E6F1FB;color:#185FA5;border-radius:18px;padding:8px 16px;font-weight:800;font-size:15px}
  .ar{color:#9aa;font-weight:800}
</style>
</head><body>
<div class="slide">
  <div class="f-top-y"></div><div class="f-top-b"></div><div class="f-left"></div><div class="f-right"></div><div class="f-bot"></div>
  <div class="body">
    <div class="title">추가 기능 — AI 어시스턴트</div>
    <div class="sub">검색 UI도 결국 필터를 직접 만져야 한다 → <b>자연어로 그 부담을 제거</b></div>
    <div class="rule"></div>
    <div class="two">
      <div class="mode q"><div class="ico">💬</div><div class="mt">질문 모드</div><div class="md">"강남구 평균가 얼마야?" → 실거래 데이터를 요약해 답변</div></div>
      <div class="mode a"><div class="ico">🖱️</div><div class="mt">에이전트 모드</div><div class="md">"전세로 보증금 3억 이하" → 필터·검색·지도를 화면에서 실행</div></div>
    </div>
    <div class="lab" style="margin-top:26px">기능 진화</div>
    <div class="steps">
      <span class="step">질문 모드</span><span class="ar">→</span>
      <span class="step">에이전트 MVP</span><span class="ar">→</span>
      <span class="step">액션·필터 확장</span><span class="ar">→</span>
      <span class="step">혼합형 재설계 · 단기기억</span>
    </div>
    <div class="cta">기술 기반 <span>Spring AI 1.1.2 · gpt-4o-mini</span> · 단일 /api/ai/assistant</div>
  </div>
</div>
<!-- Canva 재현: 2모드 컬러카드(질문 초록/조작 주황)+이모지, 진화 step pill 흐름, 하단 강조띠. -->
</body></html>
