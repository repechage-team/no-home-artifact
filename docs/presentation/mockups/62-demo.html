<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>NoHome 목업 — 6-2 시연(UCC)</title>
<link rel="stylesheet" href="shared.css">
<style>
  .two{margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start}
  .steps{display:flex;flex-direction:column;gap:12px}
  .st{display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;padding:13px 16px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
  .sn{width:34px;height:34px;border-radius:50%;background:#3E8EDE;color:#fff;font-family:'Do Hyeon',sans-serif;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .stt{font-size:16px;font-weight:700;color:#2E2E3A}
  .shots{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .shot{width:100%;border-radius:10px;border:2px solid #fff;box-shadow:0 5px 14px rgba(0,0,0,.1)}
  .vbadge{display:inline-flex;align-items:center;gap:8px;background:#FBEEDA;color:#8A4E08;border-radius:18px;padding:8px 16px;font-weight:800;font-size:15px;margin-bottom:14px}
</style>
</head><body>
<div class="slide">
  <div class="f-top-y"></div><div class="f-top-b"></div><div class="f-left"></div><div class="f-right"></div><div class="f-bot"></div>
  <div class="body">
    <div class="title">시연 — UCC 영상</div>
    <div class="sub">로컬 동작 실패 대비 <b>3~5분 영상(YouTube)</b> · Clova/육성 + 자막</div>
    <div class="rule"></div>
    <div class="two">
      <div>
        <div class="vbadge">🎬 영상 콘티 4단계</div>
        <div class="steps">
          <div class="st"><div class="sn">1</div><div class="stt">지역+거래유형 검색 → 결과 + 지도</div></div>
          <div class="st"><div class="sn">2</div><div class="stt">가격 필터 조정 → 재검색</div></div>
          <div class="st"><div class="sn">3</div><div class="stt">AI에게 "월세, 보증금 1억 이하" → 화면 자동 변화</div></div>
          <div class="st"><div class="sn">4</div><div class="stt">회원 로그인 → 내 정보</div></div>
        </div>
      </div>
      <div class="shots">
        <img class="shot" src="../../screens/gangnamguSearch.png" alt="검색">
        <img class="shot" src="../../screens/thirdHighPrice.png" alt="가격필터">
        <img class="shot" src="../../screens/notice.png" alt="공지">
        <img class="shot" src="../../screens/login.png" alt="로그인">
      </div>
    </div>
  </div>
</div>
<!-- Canva 재현: 좌 영상 콘티 4스텝(번호원), 우 실제 스크린샷 4컷. 실제 발표는 영상 임베드/재생. -->
</body></html>
